<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9fdbbe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Voice Journal" />
    <title>Voice Journal</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=craft-v1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="guide-rail" aria-label="设计说明">
        <div class="guide-item"><b>1</b><span>顶部工具栏<br />简洁操作，不打扰写作</span></div>
        <div class="guide-item"><b>2</b><span>日记导航<br />按日期和主题回看</span></div>
        <div class="guide-item"><b>3</b><span>内容编辑区<br />文字、图片和声音混排</span></div>
        <div class="guide-item"><b>4</b><span>录音工作台<br />插入声音片段块</span></div>
      </aside>

      <aside class="sidebar">
        <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="brand-row">
          <div class="brand-mark">VJ</div>
          <div>
            <h1>Voice Journal</h1>
            <p id="saveStatus">正在载入...</p>
          </div>
        </div>

        <button class="new-entry-button" id="newEntryBtn" type="button">＋ 新建日记</button>
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="搜索日记" />
        </label>

        <nav class="folder-nav" id="folderNav" aria-label="日记分类"></nav>

        <section class="recent-section">
          <h2>最近打开</h2>
          <div class="entry-list" id="entryList"></div>
        </section>

        <div class="hint-card">
          <button id="closeHintBtn" type="button">×</button>
          <strong>提示</strong>
          <span>用下方工具条插入内容块，录音会保存在当前位置。</span>
        </div>
      </aside>

      <main class="main-stage">
        <div class="cover">
          <div class="cover-actions">
            <button type="button">分享</button>
            <button type="button">格式</button>
            <button type="button">···</button>
          </div>
          <p>听见生活，记录此刻</p>
        </div>

        <article class="paper">
          <div class="doc-meta">
            <button class="date-pill" id="insertDateTopBtn" type="button">▦ 今天</button>
          </div>
          <input class="doc-title" id="titleInput" placeholder="今天的标题" />
          <input class="doc-subtitle" id="subtitleInput" placeholder="写下今天的感受..." />
          <div class="block-list" id="blockList"></div>
        </article>

        <div class="floating-toolbar" aria-label="插入块">
          <button type="button" data-insert="text">＋</button>
          <button type="button" data-insert="text">T</button>
          <button type="button" data-insert="image">▧</button>
          <button type="button" data-insert="audio">🎙</button>
          <button type="button" data-insert="date">▦</button>
        </div>
      </main>

      <aside class="record-dock">
        <div class="dock-tabs">
          <button class="active" type="button">录音</button>
          <button type="button">块导航</button>
          <button id="closeDockBtn" type="button">×</button>
        </div>

        <section class="dock-section">
          <h2>插入录音块</h2>
          <p>在光标位置插入新的声音记录，录完会保留播放器、时长和实时转写。</p>
          <button class="record-cta" id="recordBtn" type="button">🎙 开始说话</button>
          <span class="shortcut">快捷键 ⌘ R</span>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>实时转写</h2>
            <span id="speechStatus">准备就绪</span>
          </div>
          <div class="live-box" id="liveTranscript">开始录音后，文字会实时显示在这里。</div>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>声音片段</h2>
            <span id="audioCount">0</span>
          </div>
          <div class="audio-mini-list" id="audioMiniList"></div>
        </section>
      </aside>
    </div>

    <input id="imagePicker" type="file" accept="image/*" hidden />
    <script src="app.js?v=craft-v1"></script>
  </body>
</html>
