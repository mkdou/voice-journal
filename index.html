<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9fdbbe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Voice Journal" />
    <title>Voice Journal</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=craft-v2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar mobile-page" data-mobile-page="diary">
        <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="brand-row">
          <div class="brand-mark">VJ</div>
          <div>
            <h1>Voice Journal</h1>
            <p id="saveStatus">正在载入...</p>
          </div>
        </div>

        <button class="new-entry-button" id="newEntryBtn" type="button">＋ 新建日记</button>
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="搜索日记" />
        </label>

        <nav class="folder-nav" id="folderNav" aria-label="日记分类"></nav>

        <section class="recent-section">
          <h2>最近打开</h2>
          <div class="entry-list" id="entryList"></div>
        </section>

        <div class="hint-card">
          <button id="closeHintBtn" type="button">×</button>
          <strong>提示</strong>
          <span>用下方工具条插入内容块，录音会保存在当前位置。</span>
        </div>
      </aside>

      <main class="main-stage mobile-page active" data-mobile-page="today">
        <div class="cover">
          <div class="cover-actions">
            <button type="button">分享</button>
            <button type="button">格式</button>
            <button type="button">···</button>
          </div>
          <p>听见生活，记录此刻</p>
        </div>

        <article class="paper">
          <div class="doc-meta">
            <button class="date-pill" id="insertDateTopBtn" type="button">▦ 今天</button>
          </div>
          <input class="doc-title" id="titleInput" placeholder="今天的标题" />
          <input class="doc-subtitle" id="subtitleInput" placeholder="写下今天的感受..." />
          <div class="block-list" id="blockList"></div>
        </article>

        <div class="floating-toolbar" aria-label="插入块">
          <button type="button" data-insert="text">＋</button>
          <button type="button" data-insert="text">T</button>
          <button type="button" data-insert="image">▧</button>
          <button type="button" data-insert="audio">🎙</button>
          <button type="button" data-insert="date">▦</button>
        </div>
      </main>

      <aside class="record-dock mobile-page" data-mobile-page="record">
        <div class="dock-tabs">
          <button class="active" type="button">录音</button>
          <button type="button">块导航</button>
          <button id="closeDockBtn" type="button">×</button>
        </div>

        <section class="dock-section">
          <h2>插入录音块</h2>
          <p>在光标位置插入新的声音记录，录完会保留播放器、时长和实时转写。</p>
          <button class="record-cta" id="recordBtn" type="button">🎙 开始说话</button>
          <span class="shortcut">快捷键 ⌘ R</span>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>实时转写</h2>
            <span id="speechStatus">准备就绪</span>
          </div>
          <div class="live-box" id="liveTranscript">开始录音后，文字会实时显示在这里。</div>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>声音片段</h2>
            <span id="audioCount">0</span>
          </div>
          <div class="audio-mini-list" id="audioMiniList"></div>
        </section>
      </aside>

      <section class="mobile-only-panel mobile-page" data-mobile-page="idea">
        <div class="mobile-panel-card">
          <h2>灵感</h2>
          <p>快速收集还没有整理成日记的想法。第一版先作为入口保留，后面可以接模板和灵感箱。</p>
          <button class="panel-action" type="button" data-insert-mobile="text">＋ 写一条灵感</button>
        </div>
      </section>

      <section class="mobile-only-panel mobile-page" data-mobile-page="settings">
        <div class="mobile-panel-card">
          <h2>设置</h2>
          <p>本机内容会自动保存。跨手机和电脑同步需要登录邮箱并接入云端同步服务。</p>
          <label class="email-login">
            <span>邮箱</span>
            <input id="syncEmailInput" type="email" placeholder="name@example.com" autocomplete="email" />
          </label>
          <button class="panel-action" id="saveEmailBtn" type="button">保存邮箱</button>
          <div class="sync-note" id="syncStatus">未登录。当前数据仍保存在本机。</div>
        </div>
      </section>

      <nav class="mobile-tabbar" aria-label="手机底部导航">
        <button class="active" type="button" data-mobile-tab="today">▦<span>今天</span></button>
        <button type="button" data-mobile-tab="diary">▧<span>日记</span></button>
        <button class="record-tab" type="button" data-mobile-tab="record">🎙<span>录音</span></button>
        <button type="button" data-mobile-tab="idea">✎<span>灵感</span></button>
        <button type="button" data-mobile-tab="settings">⚙<span>设置</span></button>
      </nav>
    </div>

    <input id="imagePicker" type="file" accept="image/*" hidden />
    <script src="app.js?v=craft-v2"></script>
  </body>
</html>
