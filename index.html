<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9fdbbe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Voice Journal" />
    <title>Voice Journal</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=craft-v10" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar mobile-page" data-mobile-page="diary">
        <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="brand-row">
          <div class="brand-mark">VJ</div>
          <div>
            <h1>Voice Journal</h1>
            <p id="saveStatus">正在载入...</p>
          </div>
        </div>

        <button class="new-entry-button" id="newEntryBtn" type="button"><span data-icon="plus"></span> 新建日记</button>
        <label class="search-box">
          <span data-icon="search"></span>
          <input id="searchInput" type="search" placeholder="搜索日记" />
        </label>

        <nav class="folder-nav" id="folderNav" aria-label="日记分类"></nav>

        <section class="recent-section">
          <h2>最近打开</h2>
          <div class="entry-list" id="entryList"></div>
        </section>

        <div class="hint-card">
          <button id="closeHintBtn" type="button" aria-label="关闭"><span data-icon="close"></span></button>
          <strong>提示</strong>
          <span>用下方工具条插入内容块，录音会保存在当前位置。</span>
        </div>
      </aside>

      <main class="main-stage mobile-page active" data-mobile-page="today">
        <div class="cover" id="coverArea">
          <div class="cover-actions">
            <button type="button" id="changeCoverBtn">更换封面</button>
            <button type="button" id="deleteEntryBtn">删除日记</button>
          </div>
          <p>听见生活，记录此刻</p>
        </div>

        <article class="paper">
          <div class="doc-meta">
            <button class="date-pill" id="insertDateTopBtn" type="button"><span data-icon="calendar"></span> 今天</button>
          </div>
          <input class="doc-title" id="titleInput" placeholder="今天的标题" />
          <input class="doc-subtitle" id="subtitleInput" placeholder="" />
          <div class="block-list" id="blockList"></div>
        </article>

        <div class="floating-toolbar editor-toolbar" id="editorToolbar" aria-label="插入块">
          <button type="button" data-open-insert-menu aria-label="插入块"><span data-icon="plus"></span></button>
          <button type="button" data-insert="text" aria-label="文字"><span data-icon="text"></span></button>
          <button type="button" data-insert="image" aria-label="图片"><span data-icon="image"></span></button>
          <button type="button" data-insert="audio-start" aria-label="录音"><span data-icon="mic"></span></button>
          <button type="button" data-insert="date" aria-label="日期"><span data-icon="calendar"></span></button>
          <button type="button" data-open-insert-menu aria-label="更多"><span data-icon="more"></span></button>
        </div>
      </main>

      <aside class="record-dock mobile-page" data-mobile-page="record">
        <div class="dock-tabs">
          <button class="active" type="button">录音</button>
          <button type="button">块导航</button>
          <button id="closeDockBtn" type="button" aria-label="关闭"><span data-icon="close"></span></button>
        </div>

        <section class="dock-section">
          <h2>插入录音块</h2>
          <p>在光标位置插入新的声音记录，录完会保留播放器、时长和实时转写。</p>
          <button class="record-cta" id="recordBtn" type="button"><span data-icon="mic"></span> 开始说话</button>
          <span class="shortcut">快捷键 ⌘ R</span>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>实时转写</h2>
            <span id="speechStatus">准备就绪</span>
          </div>
          <div class="live-box" id="liveTranscript">开始录音后，文字会实时显示在这里。</div>
        </section>

        <section class="dock-section">
          <div class="dock-heading">
            <h2>声音片段</h2>
            <span id="audioCount">0</span>
          </div>
          <div class="audio-mini-list" id="audioMiniList"></div>
        </section>
      </aside>

      <section class="mobile-only-panel mobile-page" data-mobile-page="settings">
        <div class="mobile-panel-card">
          <h2>设置</h2>
          <p>本机内容会自动保存。跨手机和电脑同步需要登录邮箱并接入云端同步服务。</p>
          <label class="email-login">
            <span>邮箱</span>
            <input id="syncEmailInput" type="email" placeholder="name@example.com" autocomplete="email" />
          </label>
          <button class="panel-action" id="saveEmailBtn" type="button">保存邮箱</button>
          <div class="sync-note" id="syncStatus">未登录。当前数据仍保存在本机。</div>
          <div class="cover-library">
            <h3>备用封面库</h3>
            <p>一次上传多张喜欢的照片。以后新建日记时，会自动轮番挑一张当封面。</p>
            <div class="cover-library-actions">
              <button class="panel-action" id="coverLibraryBtn" type="button">上传封面图</button>
              <button class="panel-action subtle-action" id="clearCoverLibraryBtn" type="button">清空图库</button>
            </div>
            <div class="sync-note" id="coverLibraryStatus">还没有备用封面。</div>
            <div class="cover-library-list" id="coverLibraryList"></div>
          </div>
        </div>
      </section>

      <nav class="mobile-tabbar" aria-label="手机底部导航">
        <button class="active" type="button" data-mobile-tab="today"><span class="tab-emoji" aria-hidden="true">📅</span><small>今天</small></button>
        <button type="button" data-mobile-tab="diary"><span class="tab-emoji" aria-hidden="true">📔</span><small>日记</small></button>
        <button type="button" data-mobile-tab="settings"><span class="tab-emoji" aria-hidden="true">⚙️</span><small>设置</small></button>
      </nav>

      <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
      <section class="insert-sheet" id="insertSheet" hidden aria-label="插入块菜单">
        <div class="sheet-handle"></div>
        <h2>插入块</h2>
        <button type="button" data-sheet-insert="date"><span data-icon="calendar"></span><strong>日期</strong><small>插入今天或指定日期</small></button>
        <button type="button" data-sheet-insert="audio"><span data-icon="mic"></span><strong>录音</strong><small>插入声音片段</small></button>
        <button type="button" data-sheet-insert="image"><span data-icon="image"></span><strong>图片</strong><small>上传图片</small></button>
        <button type="button" data-sheet-insert="text"><span data-icon="text"></span><strong>文字</strong><small>普通文本</small></button>
        <button type="button" data-sheet-insert="divider"><span data-icon="divider"></span><strong>分割线</strong><small>插入分割线</small></button>
        <button type="button" data-sheet-insert="todo"><span data-icon="check"></span><strong>待办</strong><small>待办事项</small></button>
        <button type="button" data-sheet-insert="quote"><span data-icon="quote"></span><strong>引用</strong><small>引用一段文字</small></button>
      </section>

      <section class="insert-sheet option-sheet" id="dateSheet" hidden aria-label="选择日期">
        <div class="sheet-handle"></div>
        <h2>选择日期</h2>
        <button type="button" data-date-choice="today"><span data-icon="calendar"></span><strong>今天</strong><small>记录今天</small></button>
        <button type="button" data-date-choice="yesterday"><span data-icon="calendar"></span><strong>昨天</strong><small>回到昨天</small></button>
        <button type="button" data-date-choice="before-yesterday"><span data-icon="calendar"></span><strong>前天</strong><small>回到前天</small></button>
        <label class="sheet-date-picker">
          <span data-icon="calendar"></span>
          <strong>选择日期</strong>
          <input id="datePickerInput" type="date" />
        </label>
      </section>

      <section class="insert-sheet option-sheet" id="coverSheet" hidden aria-label="更换封面">
        <div class="sheet-handle"></div>
        <h2>更换封面</h2>
        <button type="button" data-cover-choice="upload"><span data-icon="image"></span><strong>上传本地图片</strong><small>使用自己的照片</small></button>
        <button type="button" data-cover-choice="forest"><span data-icon="image"></span><strong>默认森林</strong><small>安静的绿色封面</small></button>
        <button type="button" data-cover-choice="ocean"><span data-icon="image"></span><strong>海边</strong><small>清透的蓝绿封面</small></button>
        <button type="button" data-cover-choice="star"><span data-icon="image"></span><strong>星空</strong><small>深色夜空封面</small></button>
        <button type="button" data-cover-choice="mountain"><span data-icon="image"></span><strong>山川</strong><small>柔和山脊封面</small></button>
        <button type="button" data-cover-choice="city"><span data-icon="image"></span><strong>城市</strong><small>日常街景封面</small></button>
        <button type="button" data-cover-choice="gradient"><span data-icon="image"></span><strong>纯色渐变</strong><small>浅绿色渐变</small></button>
        <button type="button" data-cover-choice="delete"><span data-icon="close"></span><strong>删除封面</strong><small>恢复默认</small></button>
      </section>
    </div>

    <input id="imagePicker" type="file" accept="image/*" hidden />
    <input id="coverPicker" type="file" accept="image/*" hidden />
    <input id="coverLibraryPicker" type="file" accept="image/*" multiple hidden />
    <script src="app.js?v=craft-v10"></script>
  </body>
</html>
